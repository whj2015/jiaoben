<?xml version="1.0" encoding="UTF-8"?>
<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow16" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.32" stdDeviation="0.48" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="1.6" y="1.6" 
        width="12.8" height="12.8" 
        rx="2.4" ry="2.4"
        fill="url(#bgGradient16)" 
        filter="url(#shadow16)"/>
  
  <!-- 代码括号：左 < -->
  <path d="M 5.68 5.2 
           L 4 8
           L 5.68 10.8"
        stroke="#FFFFFF" 
        stroke-width="1" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- 代码括号：右 > -->
  <path d="M 10.32 5.2
           L 12 8
           L 10.32 10.8"
        stroke="#FFFFFF" 
        stroke-width="1" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- 中间斜杠 / -->
  <line x1="7.36" y1="10.24"
        x2="8.64" y2="5.76"
        stroke="#818CF8" 
        stroke-width="1" 
        stroke-linecap="round"/>
</svg>