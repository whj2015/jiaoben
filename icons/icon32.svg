<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow32" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.64" stdDeviation="0.96" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="3.2" y="3.2" 
        width="25.6" height="25.6" 
        rx="4.8" ry="4.8"
        fill="url(#bgGradient32)" 
        filter="url(#shadow32)"/>
  
  <!-- 代码括号：左 < -->
  <path d="M 11.36 10.4 
           L 8 16
           L 11.36 21.6"
        stroke="#FFFFFF" 
        stroke-width="1.92" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- 代码括号：右 > -->
  <path d="M 20.64 10.4
           L 24 16
           L 20.64 21.6"
        stroke="#FFFFFF" 
        stroke-width="1.92" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- 中间斜杠 / -->
  <line x1="14.72" y1="20.48"
        x2="17.28" y2="11.52"
        stroke="#818CF8" 
        stroke-width="1.92" 
        stroke-linecap="round"/>
</svg>