<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient48" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow48" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.96" stdDeviation="1.44" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="4.800000000000001" y="4.800000000000001" 
        width="38.4" height="38.4" 
        rx="7.199999999999999" ry="7.199999999999999"
        fill="url(#bgGradient48)" 
        filter="url(#shadow48)"/>
  
  <!-- 代码括号：左 < -->
  <path d="M 17.04 15.600000000000001 
           L 12 24
           L 17.04 32.4"
        stroke="#FFFFFF" 
        stroke-width="2.88" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- 代码括号：右 > -->
  <path d="M 30.96 15.600000000000001
           L 36 24
           L 30.96 32.4"
        stroke="#FFFFFF" 
        stroke-width="2.88" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- 中间斜杠 / -->
