<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow128" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.56" stdDeviation="3.84" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="12.8" y="12.8" 
        width="102.4" height="102.4" 
        rx="19.2" ry="19.2"
        fill="url(#bgGradient128)" 
        filter="url(#shadow128)"/>
  
  <!-- 代码括号：左 < -->
  <path d="M 45.44 41.6 
           L 32 64
           L 45.44 86.4"
        stroke="#FFFFFF" 
        stroke-width="7.68" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- 代码括号：右 > -->
  <path d="M 82.56 41.6
           L 96 64
           L 82.56 86.4"
        stroke="#FFFFFF" 
        stroke-width="7.68" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- 中间斜杠 / -->
  <line x1="58.88" y1="81.92"
        x2="69.12" y2="46.08"
        stroke="#818CF8" 
        stroke-width="7.68" 
        stroke-linecap="round"/>
</svg>